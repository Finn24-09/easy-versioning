version: 2
updates:
  # npm: groups minor/patch bumps so dist/ only needs rebuilding once per cycle; majors stay individual
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    # @actions/core (v2/v3), @actions/exec (v2/v3), and @actions/github (v9)
    # went ESM-only. @vercel/ncc@0.38 cannot bundle pure-ESM packages into the
    # CommonJS dist/index.js entrypoint used by runs.using: node20 — bumping
    # them triggers ERR_REQUIRE_ESM at runtime. Drop these ignores once ncc
    # gains reliable ESM-input support or the bundler is replaced (e.g.
    # esbuild). See closed PRs #8, #11, and #13.
    ignore:
      - dependency-name: "@actions/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@actions/exec"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@actions/github"
        update-types: ["version-update:semver-major"]

  # github-actions: single grouped PR per week for all workflow action bumps
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
